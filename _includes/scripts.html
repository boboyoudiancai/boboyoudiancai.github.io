<script>
  (function () {
    var transitionDuration = 320;
    var currentLang = null;
    var transitionTimer = null;

    function updateNavigation(lang) {
      document.documentElement.setAttribute("lang", lang === "zh" ? "zh-CN" : "en");
      document.querySelectorAll("[data-nav-en][data-nav-zh]").forEach(function (link) {
        link.textContent = link.getAttribute(lang === "zh" ? "data-nav-zh" : "data-nav-en");
      });
      document.querySelectorAll("[data-lang-switch]").forEach(function (button) {
        button.classList.toggle("is-active", button.getAttribute("data-lang-switch") === lang);
      });
    }

    function applyLanguage(lang, options) {
      var settings = options || {};
      var panels = Array.prototype.slice.call(document.querySelectorAll("[data-lang-panel]"));
      var nextPanel = document.querySelector('[data-lang-panel="' + lang + '"]');
      var activePanel = currentLang
        ? document.querySelector('[data-lang-panel="' + currentLang + '"]')
        : document.querySelector("[data-lang-panel]:not([hidden])");
      var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (!nextPanel) return;
      if (transitionTimer) {
        window.clearTimeout(transitionTimer);
        transitionTimer = null;
      }

      updateNavigation(lang);

      if (settings.instant || reduceMotion || !activePanel || activePanel === nextPanel) {
        panels.forEach(function (panel) {
          var isCurrent = panel === nextPanel;
          panel.hidden = !isCurrent;
          panel.classList.remove("is-transitioning-in", "is-transitioning-out");
          panel.classList.toggle("is-active", isCurrent);
        });
        currentLang = lang;
        return;
      }

      activePanel.classList.remove("is-active", "is-transitioning-in");
      activePanel.classList.add("is-transitioning-out");
      currentLang = lang;

      transitionTimer = window.setTimeout(function () {
        activePanel.hidden = true;
        activePanel.classList.remove("is-transitioning-out");

        nextPanel.hidden = false;
        nextPanel.classList.remove("is-active", "is-transitioning-out");
        nextPanel.classList.add("is-transitioning-in");

        window.requestAnimationFrame(function () {
          window.requestAnimationFrame(function () {
            nextPanel.classList.remove("is-transitioning-in");
            nextPanel.classList.add("is-active");
          });
        });
        transitionTimer = null;
      }, transitionDuration);
    }

    window.switchSiteLanguage = function (lang, options) {
      if (!lang || lang === currentLang) return;
      localStorage.setItem("site-lang", lang);
      applyLanguage(lang, options);
    };

    document.addEventListener("DOMContentLoaded", function () {
      var panels = document.querySelectorAll("[data-lang-panel]");
      if (!panels.length) return;

      var stored = localStorage.getItem("site-lang");
      var fallback = navigator.language && navigator.language.toLowerCase().indexOf("zh") === 0 ? "zh" : "en";
      var current = stored || fallback;
      applyLanguage(current, { instant: true });
    });
  })();
</script>
