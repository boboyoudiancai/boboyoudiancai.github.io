<script>
    $(document).ready(function () {
        var repoStatElements = document.getElementsByClassName('show_repo_stars');
        var repoCache = {};

        function renderRepoStars(element, stars, repoUrl) {
            if (stars == null) return;
            element.innerHTML =
                '<a href="' + repoUrl + '" target="_blank" rel="noopener noreferrer">' +
                '<i class="fab fa-github" aria-hidden="true"></i>' +
                '<span class="repo-stat-divider"></span>' +
                '<i class="fas fa-star" aria-hidden="true"></i>' +
                '<span class="repo-stat-value">' + stars + '</span>' +
                '</a>';
            element.classList.add('is-visible');
        }

        Array.prototype.forEach.call(repoStatElements, function (element) {
            var repo = element.getAttribute('data-github-repo');
            var repoUrl = element.getAttribute('data-github-url');

            if (!repo) return;

            if (repoCache[repo] != null) {
                renderRepoStars(element, repoCache[repo], repoUrl);
                return;
            }

            $.getJSON('https://api.github.com/repos/' + repo, function (data) {
                if (data && data.stargazers_count != null) {
                    repoCache[repo] = data.stargazers_count;
                    renderRepoStars(element, data.stargazers_count, repoUrl || data.html_url);
                }
            });
        });
    })
</script>
